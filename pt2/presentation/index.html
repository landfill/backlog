<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>컨텍스트를 관리하는 사람이 AI를 제대로 쓰는 사람입니다</title>

  <!-- Fonts -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Reveal.js CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@4/dist/theme/black.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- 웹캠 + 오버레이 (우하단 고정) -->
  <div id="gesture-ui">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="landmark-canvas"></canvas>
    <div id="gesture-status">✋ 제스처 대기</div>
  </div>

  <!-- Reveal.js 컨테이너 -->
  <div class="reveal">
    <div class="slides" id="slides-container">
      <!-- JS가 동적으로 슬라이드 삽입 -->
    </div>
  </div>

  <!-- MediaPipe Hands -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

  <!-- Reveal.js -->
  <script src="https://cdn.jsdelivr.net/npm/reveal.js@4/dist/reveal.js"></script>

  <!-- App Scripts -->
  <script src="js/gesture-engine.js?v=5"></script>
  <script src="js/main.js?v=5"></script>
</body>
</html>
